name: 10 Deploy Infrastructure

on:
  push:
    branches: [main]
    paths:
      - "bicep/**"
  workflow_dispatch:

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Azure CLI Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # - name: Create Resource Group
      #   run: az group create --name 'rg-invledger' --location 'australiaeast'

      - name: Deploy Bicep
        working-directory: bicep
        run: |
          az deployment group create \
            --name 'invledger-dev' \
            --resource-group 'rg-invledger' \
            --template-file './main.bicep' \
            --parameters './main.bicepparam'
