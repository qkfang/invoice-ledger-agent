<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invoice Agent</title>
  <link rel="stylesheet" href="../assets/styles.css" />
  <style>
    table.data { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    table.data th, table.data td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
    table.data th { background: var(--input-bg); color: var(--muted); font-weight: 600; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.03em; }
    .invoice-list { display: flex; flex-direction: column; gap: 6px; }
    .invoice-list button { background: var(--input-bg); color: var(--text); text-align: left; padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; }
    .invoice-list button.active { background: #eef2ff; border-color: var(--primary); color: var(--text); }
    .field-grid { display: grid; grid-template-columns: 160px 1fr; gap: 6px 14px; font-size: 0.9rem; }
    .field-grid .k { color: var(--muted); font-weight: 600; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.5); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .category-block { margin-top: 16px; }
    .category-block h3 { font-size: 0.95rem; margin-bottom: 6px; }
    .agent-card { background: #eef2ff; border: 1px solid #c7d2fe; }
  </style>
</head>
<body>
  <main>
    <h1>Invoice Screen <span id="agent-info-host"></span></h1>
    <div class="subtitle">The invoice agent extracts invoice details and line items from ingested documents.</div>

    <div class="grid-2">
      <div class="card">
        <h2>Ingested Invoices</h2>
        <div id="scenario-banner"></div>
        <div id="list-area" class="invoice-list"><div class="empty">Loading...</div></div>
        <button id="btn-run" style="margin-top:12px;" disabled>Run Invoice Agent</button>
        <div id="run-status" style="margin-top:6px;font-size:0.82rem;color:var(--muted);"></div>
      </div>
      <div class="card">
        <h2>Extracted Invoice</h2>
        <div id="detail-area"><div class="empty">Select an invoice on the left.</div></div>
      </div>
    </div>

    <div class="card" id="agent-result-card" style="display:none;">
      <h2>Agent Result</h2>
      <div id="agent-result-area"></div>
    </div>
  </main>

  <script src="../assets/app.js?v=20260521"></script>
  <script src="../assets/workflow.js?v=20260521"></script>
  <script>
    renderHeader('Invoice');
    mountAgentInstructionsPanel('agent-info-host', ['inv-ldg-ag-invoice']);

    let invoices = [];
    let fxRates = [];
    let selectedId = null;

    function setRunLoading(loading) {
      const b = document.getElementById('btn-run');
      b.disabled = loading || !selectedId;
      b.innerHTML = loading ? '<span class="spinner"></span>Running...' : 'Run Invoice Agent';
    }

    function renderList() {
      document.getElementById('list-area').innerHTML = invoices.map(inv => `
        <button data-id="${esc(inv.invoiceId)}" class="${inv.invoiceId === selectedId ? 'active' : ''}">
          <div><strong>${esc(inv.invoiceId)}</strong></div>
          <div style="color:var(--muted);font-size:0.82rem;">${esc(inv.vendorName)} · ${fmtMoney(inv.totalAmount, inv.currency)}</div>
        </button>`).join('');
      document.querySelectorAll('#list-area button').forEach(b => {
        b.addEventListener('click', () => {
          selectedId = b.dataset.id;
          document.getElementById('btn-run').disabled = false;
          setScenario(selectedId);
          renderScenarioBanner('scenario-banner', invoices);
          renderList();
          renderDetail();
        });
      });
    }

    function renderDetail() {
      const inv = invoices.find(i => i.invoiceId === selectedId);
      if (!inv) { document.getElementById('detail-area').innerHTML = '<div class="empty">Select an invoice on the left.</div>'; return; }
      const categories = inv.categories.map(c => {
        const audCatTotal = c.audCategoryTotal ?? convertToAud(c.categoryTotal, inv.currency, fxRates);
        return `
        <div class="category-block">
          <h3>${esc(c.categoryName)} <span style="color:var(--muted);font-weight:400;">— ${fmtMoney(c.categoryTotal, inv.currency)}${audCatTotal != null ? ` / AUD ${Number(audCatTotal).toFixed(2)}` : ''}</span></h3>
          <table class="data">
            <thead><tr><th>Description</th><th style="width:80px;">Qty</th><th style="width:110px;">Unit Price</th><th style="width:110px;">Line Total</th><th style="width:110px;">AUD</th></tr></thead>
            <tbody>
              ${c.lineItems.map(li => {
                const audLine = li.audLineTotal ?? convertToAud(li.lineTotal, inv.currency, fxRates);
                return `
                <tr>
                  <td>${esc(li.description)}</td>
                  <td>${esc(li.quantity)}</td>
                  <td>${fmtMoney(li.unitPrice, inv.currency)}</td>
                  <td>${fmtMoney(li.lineTotal, inv.currency)}</td>
                  <td>${audLine != null ? `AUD ${Number(audLine).toFixed(2)}` : '—'}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>`;
      }).join('');

      const audTotal = inv.audTotalAmount ?? convertToAud(inv.totalAmount, inv.currency, fxRates);
      document.getElementById('detail-area').innerHTML = `
        <div class="field-grid">
          <div class="k">Invoice ID</div><div>${esc(inv.invoiceId)}</div>
          <div class="k">Vendor</div><div>${esc(inv.vendorName)}</div>
          <div class="k">Invoice Date</div><div>${esc(inv.invoiceDate)}</div>
          <div class="k">Due Date</div><div>${esc(inv.dueDate)}</div>
          <div class="k">Currency</div><div>${esc(inv.currency)}</div>
          <div class="k">Total Amount</div><div>${fmtMoney(inv.totalAmount, inv.currency)}${audTotal != null ? ` <span style="color:var(--muted);font-size:0.85em;">/ AUD ${Number(audTotal).toFixed(2)}</span>` : ''}</div>
        </div>
        ${categories}`;
    }

    (async () => {
      try {
        const data = await loadWorkflowData();
        invoices = data.invoices;
        fxRates = data.fxRates || [];
        const scenario = getScenario();
        const scenarioExists = scenario && invoices.find(i => i.invoiceId === scenario);
        selectedId = scenarioExists ? scenario : (invoices[0]?.invoiceId || null);
        renderScenarioBanner('scenario-banner', invoices);
        renderList(); renderDetail();
        document.getElementById('btn-run').disabled = !selectedId;
      } catch (err) {
        document.getElementById('list-area').innerHTML = `<div class="empty error">${esc(err.message)}</div>`;
      }
    })();

    document.getElementById('btn-run').addEventListener('click', async () => {
      const inv = invoices.find(i => i.invoiceId === selectedId);
      if (!inv) return;
      setRunLoading(true);
      document.getElementById('run-status').textContent = 'Calling invoice agent...';
      const card = document.getElementById('agent-result-card');
      card.style.display = 'block';
      document.getElementById('agent-result-area').innerHTML = '<div class="empty">Running...</div>';
      try {
        const res = await fetch('/invoice/run', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ json: JSON.stringify(inv, null, 2) })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
        document.getElementById('run-status').textContent = 'Agent completed.';
        document.getElementById('agent-result-area').innerHTML = `<pre>${esc(data.response)}</pre>`;
      } catch (err) {
        document.getElementById('run-status').textContent = `Error: ${err.message}`;
        document.getElementById('agent-result-area').innerHTML =
          `<div class="empty error">Error: ${esc(err.message)}</div>`;
      }
      setRunLoading(false);
    });
  </script>
</body>
</html>
