<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exception Agent</title>
  <link rel="stylesheet" href="../assets/styles.css" />
  <style>
    table.data { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    table.data th, table.data td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
    table.data th { background: var(--input-bg); color: var(--muted); font-weight: 600; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.03em; }
    .agent-card { background: #eef2ff; border: 1px solid #c7d2fe; }
    .email-box { background: var(--input-bg); border: 1px solid var(--border); border-radius: 6px; padding: 12px; font-size: 0.85rem; white-space: pre-wrap; margin-top: 8px; font-family: ui-monospace, Menlo, monospace; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.5); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <main>
    <div id="email-folder-banner"></div>
    <h1>Exception Screen <span id="agent-info-host"></span></h1>
    <div class="subtitle">Invoice line items that could not be mapped to the ledger. The exception agent routes each to the responsible team.</div>

    <div class="card">
      <h2>Exceptions</h2>
      <div class="row">
        <label for="run-select">Run</label>
        <select id="run-select"><option value="">Loading runs…</option></select>
      </div>
      <div id="run-summary" style="margin-top:8px;font-size:0.85rem;color:var(--muted);"></div>
      <div id="exc-area" style="margin-top:10px;"><div class="empty">Select a run to view exceptions.</div></div>
    </div>

    <div class="card">
      <h2>Draft Notifications</h2>
      <div id="draft-area"><div class="empty">Click "Draft notifications" to generate emails.</div></div>
      <button id="btn-draft" style="margin-top:10px;">Draft notifications</button>
    </div>
  </main>

  <script src="../assets/app.js?v=20260523"></script>
  <script src="../assets/workflow.js?v=20260523"></script>
  <script>
    renderHeader('Exception');
    mountAgentInstructionsPanel('agent-info-host', ['inv-ldg-ag-exception']);
    renderEmailFolderBanner('email-folder-banner');

    let allExceptions = [];

    function setDraftLoading(loading) {
      const b = document.getElementById('btn-draft');
      b.disabled = loading;
      b.innerHTML = loading ? '<span class="spinner"></span>Running...' : 'Draft notifications';
    }

    function renderExceptions() {
      if (!allExceptions.length) {
        document.getElementById('exc-area').innerHTML = '<div class="empty">No exceptions found across the current invoice set.</div>';
        return;
      }
      const rows = allExceptions.map(e => `
        <tr>
          <td>${esc(e.invoiceId)}</td>
          <td>${esc(e.vendorName)}</td>
          <td>${esc(e.categoryName)}</td>
          <td>${esc(e.description)}</td>
          <td>${fmtMoney(e.lineTotal)}</td>
          <td style="color:var(--muted);">${esc(e.reason)}</td>
        </tr>`).join('');
      document.getElementById('exc-area').innerHTML = `
        <table class="data">
          <thead><tr><th>Invoice</th><th>Vendor</th><th>Category</th><th>Description</th><th>Line Total</th><th>Reason</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    document.getElementById('btn-draft').addEventListener('click', async () => {
      if (!allExceptions.length) {
        document.getElementById('draft-area').innerHTML = '<div class="empty">No exceptions to draft.</div>';
        return;
      }
      setDraftLoading(true);
      document.getElementById('draft-area').innerHTML = '<div class="empty">Running exception agent...</div>';
      try {
        const message = `The following invoice line items could not be matched to the approved ledger. Please process each exception, assign to the appropriate team, draft and send notification emails.\n\nExceptions:\n${JSON.stringify(allExceptions, null, 2)}`;
        const res = await fetch('/exception/draft', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ json: message })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
        renderDraftResult(data.response);
      } catch (err) {
        document.getElementById('draft-area').innerHTML =
          `<div class="empty error">Error: ${esc(err.message)}</div>`;
      }
      setDraftLoading(false);
    });

    function renderDraftResult(response) {
      const m = response && response.match(/\{[\s\S]*\}/);
      const parsed = m ? (() => { try { return JSON.parse(m[0]); } catch { return null; } })() : null;
      const items = parsed && Array.isArray(parsed.items) ? parsed.items : null;
      if (items) {
        document.getElementById('draft-area').innerHTML = items.map(it => `
          <div style="margin-bottom:14px;">
            <div style="font-size:0.85rem;color:var(--muted);">Assigned team: <strong>${esc(it.assignedTeam)}</strong> · Recipient: <code>${esc(it.recipient)}</code></div>
            <div style="font-size:0.9rem;margin-top:4px;"><strong>${esc(it.subject)}</strong></div>
            <div class="email-box">${esc(it.body)}</div>
            <div style="font-size:0.8rem;color:var(--muted);margin-top:4px;">Send result: ${esc(it.sendResult)}</div>
          </div>`).join('');
      } else {
        document.getElementById('draft-area').innerHTML = `<pre>${esc(response)}</pre>`;
      }
    }

    (async () => {
      const runSel = document.getElementById('run-select');
      const summary = document.getElementById('run-summary');
      let ledger = null, rules = null;
      try {
        const domain = await loadDomainData();
        ledger = domain.ledger;
        rules = domain.rules;
      } catch (err) {
        document.getElementById('exc-area').innerHTML = `<div class="empty error">${esc(err.message)}</div>`;
        return;
      }

      runSel.addEventListener('change', async () => {
        const runName = runSel.value;
        allExceptions = [];
        if (!runName) {
          summary.textContent = '';
          document.getElementById('exc-area').innerHTML = '<div class="empty">Select a run to view exceptions.</div>';
          return;
        }
        summary.textContent = 'Loading invoice…';
        document.getElementById('exc-area').innerHTML = '<div class="empty">Loading…</div>';
        try {
          const payload = await loadRunInvoice(runName);
          if (!payload) {
            summary.innerHTML = `<span class="error">No extracted invoice for <strong>${esc(runName)}</strong>. Run the invoice agent on the Invoice tab first.</span>`;
            document.getElementById('exc-area').innerHTML = '<div class="empty">No invoice available.</div>';
            return;
          }
          const invoices = extractInvoiceArray(payload);
          for (const inv of invoices) {
            const { results } = processInvoice(inv, ledger, rules);
            allExceptions.push(...results.filter(r => r.status === 'exception'));
          }
          summary.textContent = `Evaluated ${invoices.length} invoice(s) from ${runName}.`;
          renderExceptions();
        } catch (err) {
          summary.innerHTML = `<span class="error">Error: ${esc(err.message)}</span>`;
          document.getElementById('exc-area').innerHTML = `<div class="empty error">${esc(err.message)}</div>`;
        }
      });

      await populateRunSelect('run-select');
    })();
  </script>
</body>
</html>
