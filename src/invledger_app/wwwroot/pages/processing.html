<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Processing Agent</title>
  <link rel="stylesheet" href="../assets/styles.css" />
  <style>
    table.data { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    table.data th, table.data td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
    table.data th { background: var(--input-bg); color: var(--muted); font-weight: 600; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.03em; }
    .summary-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
    .summary-pill { background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; min-width: 120px; }
    .summary-pill .n { font-size: 1.4rem; font-weight: 700; }
    .summary-pill .l { color: var(--muted); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.03em; }
    .notes-box { background: var(--input-bg); border: 1px solid var(--border); border-radius: 6px; padding: 12px; font-size: 0.85rem; white-space: pre-wrap; margin-top: 8px; font-family: ui-monospace, Menlo, monospace; }
    .rule-pill { display: inline-block; padding: 1px 8px; border-radius: 999px; font-size: 0.7rem; font-weight: 600; background: #eef2ff; color: var(--primary); }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.5); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .io-box { background: var(--input-bg); border: 1px solid var(--border); border-radius: 6px; padding: 12px; font-size: 0.8rem; white-space: pre-wrap; font-family: ui-monospace, Menlo, monospace; max-height: 260px; overflow: auto; }
    .reasoning-text { color: var(--muted); font-size: 0.78rem; font-style: italic; }
  </style>
</head>
<body>
  <main>
    <div id="email-folder-banner"></div>
    <h1>Processing Screen <span id="agent-info-host"></span></h1>
    <div class="subtitle">The processing agent matches each invoice line item against the approved ledger using category, sub-item and dollar checks.</div>

    <div class="card">
      <h2>Run Processing</h2>
      <div class="row">
        <label for="run-select">Run</label>
        <select id="run-select"><option value="">Loading runs…</option></select>
      </div>
      <div id="run-summary" style="margin-top:8px;font-size:0.85rem;color:var(--muted);"></div>
      <button id="btn-run" disabled>Run Processing Agent</button>
    </div>

    <div class="card">
      <h2>Result</h2>
      <div class="tabs">
        <button class="tab active" data-tab="result">Result</button>
        <button class="tab" data-tab="input">Agent Input</button>
        <button class="tab" data-tab="output">Agent Output</button>
      </div>
      <div class="tab-panel active" data-panel="result">
        <div id="result-area"><div class="empty">Run processing to see results.</div></div>
      </div>
      <div class="tab-panel" data-panel="input">
        <div id="input-area" class="io-box"><div class="empty">No agent input yet.</div></div>
      </div>
      <div class="tab-panel" data-panel="output">
        <div id="output-area" class="io-box"><div class="empty">No agent output yet.</div></div>
      </div>
    </div>
  </main>

  <script src="../assets/app.js?v=20260523"></script>
  <script src="../assets/workflow.js?v=20260523"></script>
  <script>
    renderHeader('Processing');
    mountAgentInstructionsPanel('agent-info-host', ['inv-ldg-ag-processing']);
    renderEmailFolderBanner('email-folder-banner');

    document.querySelectorAll('.tabs .tab').forEach(btn => {
      btn.addEventListener('click', () => {
        const target = btn.dataset.tab;
        document.querySelectorAll('.tabs .tab').forEach(t => t.classList.toggle('active', t === btn));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.dataset.panel === target));
      });
    });

    let invoices = [];
    let currentRunName = null;

    function setRunLoading(loading) {
      const b = document.getElementById('btn-run');
      b.disabled = loading;
      b.innerHTML = loading ? '<span class="spinner"></span>Running...' : 'Run Processing Agent';
    }

    function renderCachedRun(cached) {
      // processing.json now holds the parsed agent JSON directly (no input/response wrapper).
      const list = Array.isArray(cached?.invoices) ? cached.invoices
                 : Array.isArray(cached) ? cached
                 : (cached && cached.invoiceId ? [cached] : null);
      if (list) {
        document.getElementById('result-area').innerHTML =
          list.map(renderResultHtml).join('<hr style="margin:18px 0;border:none;border-top:1px solid var(--border);" />');
      } else {
        document.getElementById('result-area').innerHTML = `<pre>${esc(JSON.stringify(cached, null, 2))}</pre>`;
      }
    }

    function renderItemsTable(items, currency) {
      if (!items || !items.length) return '<div class="empty">None.</div>';
      const rows = items.map(r => `
        <tr>
          <td>${esc(r.lineItem)}</td>
          <td>${esc(r.lineItemCategory)}</td>
          <td>${esc(r.lineItemDescription)}</td>
          <td>${esc(r.businessName)}</td>
          <td>${r.quantity != null ? r.quantity : '—'}</td>
          <td>${r.unitPrice != null ? fmtMoney(r.unitPrice, currency) : '—'}</td>
          <td>${r.lineTotal != null ? fmtMoney(r.lineTotal, currency) : '—'}</td>
          <td>${esc(r.status || '')}</td>
          <td><span class="rule-pill">${esc(r.ruleApplied || '')}</span></td>
          <td style="color:var(--muted);">${esc(r.reason || '')}</td>
        </tr>`).join('');
      return `
        <table class="data">
          <thead><tr>
            <th>Line Item</th><th>Category</th><th>Description</th><th>Business</th>
            <th>Qty</th><th>Unit Price</th><th>Line Total</th>
            <th>Status</th><th>Rule</th><th>Reason</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    function renderResultHtml(result) {
      const header = `
        <div class="summary-row">
          <div class="summary-pill"><div class="n">${esc(result.businessName)}</div><div class="l">Business</div></div>
          <div class="summary-pill"><div class="n">${esc(result.fromDate)}</div><div class="l">From Date</div></div>
          <div class="summary-pill"><div class="n">${esc(result.toDate)}</div><div class="l">To Date</div></div>
          <div class="summary-pill"><div class="n">${fmtMoney(result.originalInvoiceAmount, result.originalInvoiceCurrency)}</div><div class="l">Original Amount</div></div>
          <div class="summary-pill"><div class="n">${esc(result.exchangeRate)}</div><div class="l">Exchange Rate</div></div>
          <div class="summary-pill"><div class="n">${fmtMoney(result.convertedInvoiceAmount, 'AUD')}</div><div class="l">Converted (AUD)</div></div>
          <div class="summary-pill"><div class="n">${(result.lineItems || []).length}</div><div class="l">Processable</div></div>
          <div class="summary-pill"><div class="n">${(result.exceptions || []).length}</div><div class="l">Exceptions</div></div>
        </div>`;

      return `
        <h3 style="margin:4px 0 8px;font-size:0.95rem;">${esc(result.invoiceId || '')}</h3>
        ${header}
        <h4 style="margin:14px 0 6px;font-size:0.85rem;">Processable line items</h4>
        ${renderItemsTable(result.lineItems, result.originalInvoiceCurrency)}
        <h4 style="margin:14px 0 6px;font-size:0.85rem;">Exceptions</h4>
        ${renderItemsTable(result.exceptions, result.originalInvoiceCurrency)}`;
    }

    function parseAgentJson(text) {
      const m = text && text.match(/\{[\s\S]*\}/);
      if (!m) return null;
      try { return JSON.parse(m[0]); } catch { return null; }
    }

    document.getElementById('btn-run').addEventListener('click', async () => {
      if (!invoices.length) return;
      setRunLoading(true);
      document.getElementById('result-area').innerHTML = '<div class="empty">Running agent...</div>';
      document.getElementById('input-area').innerHTML = '<div class="empty">No agent input yet.</div>';
      document.getElementById('output-area').innerHTML = '<div class="empty">No agent output yet.</div>';
      try {
        const res = await fetch('/processing/run', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ json: JSON.stringify(invoices, null, 2), runName: currentRunName })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

        if (data.input) document.getElementById('input-area').textContent = data.input;
        if (data.response) document.getElementById('output-area').textContent = data.response;

        const result = parseAgentJson(data.response);
        if (result) {
          const list = Array.isArray(result.invoices) ? result.invoices
                     : Array.isArray(result) ? result
                     : [result];
          document.getElementById('result-area').innerHTML =
            list.map(renderResultHtml).join('<hr style="margin:18px 0;border:none;border-top:1px solid var(--border);" />');
        } else {
          document.getElementById('result-area').innerHTML = `<pre>${esc(data.response)}</pre>`;
        }
      } catch (err) {
        document.getElementById('result-area').innerHTML =
          `<div class="empty error">Error: ${esc(err.message)}</div>`;
      }
      setRunLoading(false);
    });

    (async () => {
      const runSel = document.getElementById('run-select');
      const summary = document.getElementById('run-summary');

      runSel.addEventListener('change', async () => {
        const runName = runSel.value;
        currentRunName = runName || null;
        invoices = [];
        document.getElementById('result-area').innerHTML = '<div class="empty">Run processing to see results.</div>';
        document.getElementById('input-area').innerHTML = '<div class="empty">No agent input yet.</div>';
        document.getElementById('output-area').innerHTML = '<div class="empty">No agent output yet.</div>';
        if (!runName) {
          summary.textContent = '';
          document.getElementById('btn-run').disabled = true;
          return;
        }
        summary.textContent = 'Loading invoices…';
        try {
          const payload = await loadRunInvoice(runName);
          if (!payload) {
            summary.innerHTML = `<span class="error">No extracted invoice for <strong>${esc(runName)}</strong>. Open the Invoice tab and run the invoice agent for this run first.</span>`;
            document.getElementById('btn-run').disabled = true;
            return;
          }
          invoices = extractInvoiceArray(payload);
          summary.textContent = `Loaded ${invoices.length} invoice(s) from ${runName}.`;
          document.getElementById('btn-run').disabled = invoices.length === 0;

          // Load cached processing result if available.
          const cachedRes = await fetch(`/processing/runs/${encodeURIComponent(runName)}`);
          if (cachedRes.ok) {
            const cached = await cachedRes.json();
            renderCachedRun(cached);
            summary.textContent += ' Cached result loaded — click Run to overwrite.';
          }

          // Load cached agent input/output if available.
          const [inRes, outRes] = await Promise.all([
            fetch(`/processing/runs/${encodeURIComponent(runName)}/agentinput`),
            fetch(`/processing/runs/${encodeURIComponent(runName)}/agentoutput`)
          ]);
          if (inRes.ok) {
            const j = await inRes.json();
            if (j && typeof j.input === 'string') document.getElementById('input-area').textContent = j.input;
          }
          if (outRes.ok) {
            const j = await outRes.json();
            if (j && typeof j.output === 'string') document.getElementById('output-area').textContent = j.output;
          }
        } catch (err) {
          summary.innerHTML = `<span class="error">Error: ${esc(err.message)}</span>`;
          document.getElementById('btn-run').disabled = true;
        }
      });

      await populateRunSelect('run-select');
    })();
  </script>
</body>
</html>
