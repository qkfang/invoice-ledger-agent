<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Processing Agent</title>
  <link rel="stylesheet" href="../assets/styles.css" />
  <style>
    table.data { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    table.data th, table.data td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
    table.data th { background: var(--input-bg); color: var(--muted); font-weight: 600; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.03em; }
    .summary-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
    .summary-pill { background: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; min-width: 120px; }
    .summary-pill .n { font-size: 1.4rem; font-weight: 700; }
    .summary-pill .l { color: var(--muted); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.03em; }
    .notes-box { background: var(--input-bg); border: 1px solid var(--border); border-radius: 6px; padding: 12px; font-size: 0.85rem; white-space: pre-wrap; margin-top: 8px; font-family: ui-monospace, Menlo, monospace; }
    .rule-pill { display: inline-block; padding: 1px 8px; border-radius: 999px; font-size: 0.7rem; font-weight: 600; background: #eef2ff; color: var(--primary); }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.5); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .io-box { background: var(--input-bg); border: 1px solid var(--border); border-radius: 6px; padding: 12px; font-size: 0.8rem; white-space: pre-wrap; font-family: ui-monospace, Menlo, monospace; max-height: 260px; overflow: auto; }
    .reasoning-text { color: var(--muted); font-size: 0.78rem; font-style: italic; }
  </style>
</head>
<body>
  <main>
    <div id="email-folder-banner"></div>
    <h1>Processing Screen <span id="agent-info-host"></span></h1>
    <div class="subtitle">The processing agent matches each invoice line item against the approved ledger using category, sub-item and dollar checks.</div>

    <div class="card">
      <h2>Run Processing</h2>
      <div id="scenario-banner"></div>
      <div class="row">
        <label for="invoice-select">Invoice</label>
        <select id="invoice-select"></select>
      </div>
      <button id="btn-run">Run Processing Agent</button>
    </div>

    <div class="card" id="io-card" style="display:none;">
      <h2>Agent Input</h2>
      <div id="input-area" class="io-box"></div>
      <h2 style="margin-top:16px;">Agent Output</h2>
      <div id="output-area" class="io-box"></div>
    </div>

    <div class="card">
      <h2>Result</h2>
      <div id="result-area"><div class="empty">Run processing to see results.</div></div>
    </div>
  </main>

  <script src="../assets/app.js?v=20260521"></script>
  <script src="../assets/workflow.js?v=20260521"></script>
  <script>
    renderHeader('Processing');
    mountAgentInstructionsPanel('agent-info-host', ['inv-ldg-ag-processing']);
    renderEmailFolderBanner('email-folder-banner');

    let invoices = [];

    function setRunLoading(loading) {
      const b = document.getElementById('btn-run');
      b.disabled = loading;
      b.innerHTML = loading ? '<span class="spinner"></span>Running...' : 'Run Processing Agent';
    }

    function renderInvoiceOptions() {
      document.getElementById('invoice-select').innerHTML = invoices.map(i =>
        `<option value="${esc(i.invoiceId)}">${esc(i.invoiceId)} — ${esc(i.vendorName)} (${fmtMoney(i.totalAmount, i.currency)})</option>`
      ).join('');
    }

    function renderResult(result) {
      const header = `
        <div class="summary-row">
          <div class="summary-pill"><div class="n">${esc(result.businessName)}</div><div class="l">Business</div></div>
          <div class="summary-pill"><div class="n">${esc(result.fromDate)}</div><div class="l">From Date</div></div>
          <div class="summary-pill"><div class="n">${esc(result.toDate)}</div><div class="l">To Date</div></div>
          <div class="summary-pill"><div class="n">${fmtMoney(result.originalInvoiceAmount, result.originalInvoiceCurrency)}</div><div class="l">Original Amount</div></div>
          <div class="summary-pill"><div class="n">${esc(result.exchangeRate)}</div><div class="l">Exchange Rate</div></div>
          <div class="summary-pill"><div class="n">${fmtMoney(result.convertedInvoiceAmount, 'AUD')}</div><div class="l">Converted (AUD)</div></div>
        </div>`;

      const rows = (result.lineItems || []).map(r => `
        <tr>
          <td>${esc(r.lineItem)}</td>
          <td>${esc(r.lineItemCategory)}</td>
          <td>${esc(r.lineItemDescription)}</td>
          <td>${esc(r.businessName)}</td>
          <td>${r.quantity != null ? r.quantity : '—'}</td>
          <td>${r.unitPrice != null ? fmtMoney(r.unitPrice, result.originalInvoiceCurrency) : '—'}</td>
          <td>${r.lineTotal != null ? fmtMoney(r.lineTotal, result.originalInvoiceCurrency) : '—'}</td>
        </tr>`).join('');

      document.getElementById('result-area').innerHTML = `
        ${header}
        <table class="data">
          <thead><tr>
            <th>Line Item</th><th>Category</th><th>Description</th><th>Business</th>
            <th>Qty</th><th>Unit Price</th><th>Line Total</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    function parseAgentJson(text) {
      const m = text && text.match(/\{[\s\S]*\}/);
      if (!m) return null;
      try { return JSON.parse(m[0]); } catch { return null; }
    }

    document.getElementById('btn-run').addEventListener('click', async () => {
      const id = document.getElementById('invoice-select').value;
      const inv = invoices.find(i => i.invoiceId === id);
      if (!inv) return;
      setRunLoading(true);
      document.getElementById('result-area').innerHTML = '<div class="empty">Running agent...</div>';
      const ioCard = document.getElementById('io-card');
      ioCard.style.display = 'none';
      try {
        const res = await fetch('/processing/run', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ json: JSON.stringify(inv, null, 2) })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

        if (data.input || data.response) {
          document.getElementById('input-area').textContent = data.input || '';
          document.getElementById('output-area').textContent = data.response || '';
          ioCard.style.display = 'block';
        }

        const result = parseAgentJson(data.response);
        if (result) {
          renderResult(result);
        } else {
          document.getElementById('result-area').innerHTML = `<pre>${esc(data.response)}</pre>`;
        }
      } catch (err) {
        document.getElementById('result-area').innerHTML =
          `<div class="empty error">Error: ${esc(err.message)}</div>`;
      }
      setRunLoading(false);
    });

    (async () => {
      try {
        const data = await loadWorkflowData();
        invoices = data.invoices;
        renderInvoiceOptions();
        const scenario = getScenario();
        if (scenario) {
          const sel = document.getElementById('invoice-select');
          const opt = [...sel.options].find(o => o.value === scenario);
          if (opt) sel.value = scenario;
        }
        renderScenarioBanner('scenario-banner', invoices);
      } catch (err) {
        document.getElementById('result-area').innerHTML = `<div class="empty error">${esc(err.message)}</div>`;
      }
    })();
  </script>
</body>
</html>
