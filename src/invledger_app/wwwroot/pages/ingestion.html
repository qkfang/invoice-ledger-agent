<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ingestion Agent</title>
  <link rel="stylesheet" href="../assets/styles.css" />
  <style>
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.5); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .field-grid { display: grid; grid-template-columns: 160px 1fr; gap: 6px 14px; font-size: 0.9rem; }
    .field-grid .k { color: var(--muted); font-weight: 600; }

    /* Outlook-style email inbox layout */
    .email-layout {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: var(--card);
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      margin-bottom: 18px;
      display: grid;
      grid-template-columns: 300px 1fr;
      min-height: 480px;
    }

    .email-list {
      border-right: 1px solid var(--border);
      background: var(--input-bg);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .email-list-header {
      padding: 12px 14px;
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border);
      background: #fff;
    }
    .email-list-item {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: background 0.12s;
    }
    .email-list-item:hover { background: #eef2f7; }
    .email-list-item.active {
      background: #fff;
      border-left: 3px solid #0369a1;
      padding-left: 11px;
    }
    .email-list-from { font-weight: 700; font-size: 0.88rem; color: var(--text); }
    .email-list-subject { font-size: 0.82rem; color: #333; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .email-list-preview { font-size: 0.76rem; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .email-list-empty { padding: 16px; color: var(--muted); font-size: 0.85rem; }

    .email-detail {
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      overflow: auto;
    }
    .email-detail-empty { display: flex; align-items: center; justify-content: center; flex: 1; }
    .email-meta-row { display: flex; gap: 6px; font-size: 0.83rem; }
    .email-meta-key { color: var(--muted); font-weight: 600; min-width: 60px; }
    .email-meta-val { color: var(--text); }
    .email-subject-line { font-size: 1rem; font-weight: 700; color: var(--text); }
    .email-body {
      background: var(--input-bg); border: 1px solid var(--border); border-radius: 6px;
      padding: 12px 14px; font-size: 0.85rem; color: #333; white-space: pre-wrap; line-height: 1.6;
    }

    /* Attachments / document table */
    table.data { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    table.data th, table.data td { text-align: left; padding: 9px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    table.data th { background: var(--input-bg); color: var(--muted); font-weight: 600; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.03em; }
    table.data tr:last-child td { border-bottom: none; }

    .btn-process {
      background: #0369a1; color: #fff; border: none; border-radius: 6px;
      padding: 7px 16px; font-size: 0.85rem; font-weight: 600; cursor: pointer; margin-top: 10px;
    }
    .btn-process:hover:not(:disabled) { background: #0284c7; }
    .btn-process:disabled { background: #7dd3fc; cursor: not-allowed; }

    /* Invoice result display */
    .invoice-card {
      border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px;
      margin-bottom: 12px; background: #f8fafc;
    }
    .invoice-card h4 { margin: 0 0 10px; font-size: 0.92rem; color: var(--text); }
    .invoice-items { margin-top: 8px; font-size: 0.82rem; color: #555; }
    .invoice-items li { margin-bottom: 3px; }
  </style>
</head>
<body>
  <main>
    <h1>Ingestion Screen <span id="agent-info-host"></span></h1>
    <div class="subtitle">The ingestion agent receives incoming vendor invoice documents into the inbox.</div>

    <!-- Email Inbox (populated from scenarios) -->
    <div class="email-layout" id="email-layout">
      <div class="email-list" id="email-list">
        <div class="email-list-header">📧 Inbox</div>
        <div class="email-list-empty" id="email-list-body">Loading…</div>
      </div>
      <div class="email-detail" id="email-detail">
        <div class="email-detail-empty"><div class="empty">Select an email to view details and attachments.</div></div>
      </div>
    </div>

    <!-- Process result -->
    <div class="card" id="process-result-card" style="display:none;">
      <h2>📤 Processing Result</h2>
      <div id="process-result-area"></div>
    </div>
  </main>

  <script src="../assets/app.js?v=20260523"></script>
  <script src="../assets/workflow.js?v=20260523"></script>
  <script>
    renderHeader('Ingestion');
    mountAgentInstructionsPanel('agent-info-host', ['inv-ldg-ag-ingestion']);

    let allScenarios = [];
    let currentScenario = null;

    async function loadScenarios() {
      const res = await fetch('/ingestion/scenarios');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    function renderScenarioList(scenarios) {
      const listBody = document.getElementById('email-list-body');
      const list = document.getElementById('email-list');
      if (!scenarios.length) {
        listBody.textContent = 'No scenarios available';
        return;
      }
      // Replace placeholder with actual items
      listBody.remove();
      scenarios.forEach(s => {
        const item = document.createElement('div');
        item.className = 'email-list-item';
        item.dataset.name = s.name;
        const preview = (s.email.body || '').replace(/\s+/g, ' ').trim().slice(0, 80);
        item.innerHTML = `
          <div class="email-list-from">${esc(s.email.fromName || '')}</div>
          <div class="email-list-subject">${esc(s.email.subject || '')}</div>
          <div class="email-list-preview">${esc(preview)}</div>`;
        item.addEventListener('click', () => {
          document.querySelectorAll('.email-list-item').forEach(el => el.classList.remove('active'));
          item.classList.add('active');
          showScenarioDetail(s);
        });
        list.appendChild(item);
      });
    }

    function showScenarioDetail(scenario) {
      currentScenario = scenario;
      const email = scenario.email;
      const detail = document.getElementById('email-detail');
      detail.innerHTML = `
        <div class="email-subject-line">${esc(email.subject)}</div>
        <div>
          <div class="email-meta-row"><span class="email-meta-key">From</span><span class="email-meta-val">${esc(email.fromName)} &lt;${esc(email.from)}&gt;</span></div>
          <div class="email-meta-row"><span class="email-meta-key">To</span><span class="email-meta-val">${esc(email.to)}</span></div>
          <div class="email-meta-row"><span class="email-meta-key">Date</span><span class="email-meta-val">${esc(email.date)}</span></div>
        </div>
        <div class="email-body">${esc(email.body)}</div>
        <div id="attachments-area"></div>
        <div id="process-action-area"></div>`;
      renderAttachments(email.attachments || []);
      const action = document.getElementById('process-action-area');
      action.innerHTML = `<button class="btn-process" id="btn-process-email">⚙ Process Selected Email</button>`;
      document.getElementById('btn-process-email').addEventListener('click', processSelectedScenario);

      // Try to load cached result for this scenario.
      const resultCard = document.getElementById('process-result-card');
      const resultArea = document.getElementById('process-result-area');
      resultCard.style.display = 'none';
      resultArea.innerHTML = '';
      fetch(`/ingestion/scenarios/${encodeURIComponent(scenario.name)}/result`)
        .then(r => r.ok ? r.json() : null)
        .then(cached => {
          if (!cached || currentScenario !== scenario) return;
          resultCard.style.display = '';
          renderProcessResult(cached);
          const banner = document.createElement('div');
          banner.style.cssText = 'font-size:0.78rem;color:#92400e;background:#fef3c7;border:1px solid #fcd34d;border-radius:6px;padding:6px 10px;margin-bottom:10px;';
          banner.textContent = 'Cached result loaded — click Process Selected Email to overwrite.';
          resultArea.prepend(banner);
        })
        .catch(() => {});
    }

    async function processSelectedScenario() {
      if (!currentScenario) return;
      const btn = document.getElementById('btn-process-email');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Processing…';

      const resultCard = document.getElementById('process-result-card');
      const resultArea = document.getElementById('process-result-area');
      resultCard.style.display = '';
      resultArea.innerHTML = '<div class="empty">Running agent…</div>';

      try {
        const res = await fetch('/ingestion/process-scenario', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ scenarioName: currentScenario.name })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
        renderProcessResult(data);
      } catch (err) {
        resultArea.innerHTML = `<div class="empty error" style="color:#991b1b;">Error: ${esc(err.message)}</div>`;
      }

      btn.disabled = false;
      btn.innerHTML = '⚙ Process Selected Email';
    }

    function renderProcessResult(data) {
      const resultArea = document.getElementById('process-result-area');
      const agentResp = data.agentResponse || '';
      const m = agentResp.match(/\{[\s\S]*\}/);
      let parsed = null;
      if (m) { try { parsed = JSON.parse(m[0]); } catch {} }

      const invoices = (parsed && Array.isArray(parsed.invoices)) ? parsed.invoices : [];
      const pdfs = Array.isArray(data.pdfs) ? data.pdfs : [];

      function findInvoiceForPdf(pdfName) {
        return invoices.find(inv => (inv.fileName || '').toLowerCase() === pdfName.toLowerCase())
          || invoices.find(inv => pdfName.toLowerCase().includes((inv.invoiceId || '').toLowerCase()))
          || null;
      }

      let statusHtml = '';
      if (parsed) {
        const statusBg = parsed.ingestionStatus === 'accepted' ? '#f0fdf4' : '#fef2f2';
        const statusBorder = parsed.ingestionStatus === 'accepted' ? '#86efac' : '#fca5a5';
        statusHtml = `
          <div style="background:${statusBg};border:1px solid ${statusBorder};border-radius:6px;padding:10px 14px;margin-bottom:12px;">
            <div style="font-weight:700;font-size:0.9rem;">
              ${statusBadge(parsed.ingestionStatus)} &nbsp; ${esc(parsed.reason || '')}
            </div>
          </div>`;
      }

      const filesHtml = (data.savedFiles || []).map(f => `<span style="margin-right:10px;">📄 ${esc(f)}</span>`).join('');

      const pdfOptions = pdfs.length
        ? pdfs.map((p, i) => `<option value="${i}">${esc(p.name)}</option>`).join('')
        : '<option value="">No PDFs</option>';

      resultArea.innerHTML = `
        <div style="font-size:0.85rem;color:#166534;background:#f0fdf4;border:1px solid #86efac;border-radius:6px;padding:8px 12px;margin-bottom:12px;">
          📁 Run folder: <strong>${esc(data.runFolder)}</strong> &nbsp;|&nbsp; ${filesHtml}
        </div>
        ${statusHtml}
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;">
          <label for="pdf-select" style="font-size:0.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;">📄 PDF</label>
          <select id="pdf-select" style="flex:1;min-width:240px;padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:0.88rem;background:#fff;">${pdfOptions}</select>
        </div>
        <div id="pdf-detail-area"></div>
        <details style="margin-top:12px;">
          <summary style="cursor:pointer;font-size:0.82rem;color:var(--muted);">Raw Agent Response</summary>
          <pre style="margin-top:6px;">${esc(agentResp)}</pre>
        </details>`;

      function renderPdfDetail(idx) {
        const area = document.getElementById('pdf-detail-area');
        const pdf = pdfs[idx];
        if (!pdf) { area.innerHTML = ''; return; }
        const pdfSrc = `${pdf.url}#toolbar=1&navpanes=0&pagemode=none`;
        area.innerHTML = `
          <div style="border:1px solid var(--border);border-radius:8px;padding:14px;background:#f8fafc;">
            <div class="doc-preview" style="background:#fff;border:1px solid var(--border);border-radius:6px;overflow:hidden;">
              <iframe src="${esc(pdfSrc)}" title="${esc(pdf.name)}" style="width:100%;height:620px;border:none;"></iframe>
            </div>
          </div>`;
      }

      const sel = document.getElementById('pdf-select');
      if (sel && pdfs.length) {
        sel.addEventListener('change', () => renderPdfDetail(parseInt(sel.value, 10)));
        renderPdfDetail(0);
      }
    }

    function renderAttachments(attachments) {
      const area = document.getElementById('attachments-area');
      if (!area) return;
      if (!attachments.length) { area.innerHTML = ''; return; }

      const rows = attachments.map(att => `
          <tr>
            <td>📄 <strong>${esc(att.name)}</strong></td>
            <td>${statusBadge('pending')}</td>
          </tr>`).join('');

      area.innerHTML = `
        <div style="font-size:0.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;">📎 Attachments</div>
        <table class="data">
          <thead><tr><th>Document</th><th>Status</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    (async () => {
      try {
        const scenarios = await loadScenarios();
        allScenarios = scenarios;
        renderScenarioList(scenarios);
      } catch (err) {
        document.getElementById('email-list-body').textContent = `Error: ${err.message}`;
      }
    })();
  </script>
</body>
</html>
