<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ledger Agent</title>
  <link rel="stylesheet" href="../assets/styles.css" />
  <style>
    table.data { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    table.data th, table.data td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
    table.data th { background: var(--input-bg); color: var(--muted); font-weight: 600; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.03em; }
    .cat-block { margin-top: 18px; border-top: 1px solid var(--border); padding-top: 14px; }
    .cat-block:first-child { border-top: none; margin-top: 0; padding-top: 0; }
    .cat-block h3 { font-size: 0.95rem; margin-bottom: 10px; }
    .cat-meta { color: var(--muted); font-weight: 400; font-size: 0.85rem; margin-left: 6px; }
    .ledger-split { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 800px) { .ledger-split { grid-template-columns: 1fr; } }
    .col-label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); margin-bottom: 6px; }
    .agent-card { background: #eef2ff; border: 1px solid #c7d2fe; }
    .qa-box { background: var(--input-bg); border: 1px solid var(--border); border-radius: 6px; padding: 12px; font-size: 0.88rem; margin-top: 8px; white-space: pre-wrap; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.5); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <main>
    <h1>Ledger Screen <span id="agent-info-host"></span></h1>
    <div class="subtitle">Approved ledger categories, sub-items, and posted entries. The ledger agent answers questions about this data.</div>

    <div class="card">
      <h2>Approved Ledger</h2>
      <div class="row">
        <label for="run-select">Run</label>
        <select id="run-select"><option value="">Loading runs…</option></select>
      </div>
      <div id="run-summary" style="margin-top:8px;font-size:0.85rem;color:var(--muted);"></div>
      <div id="ledger-area" style="margin-top:10px;"><div class="empty">Loading...</div></div>
    </div>

    <div class="card">
      <h2>Posted Entries</h2>
      <div id="posted-area"><div class="empty">Loading...</div></div>
    </div>

    <div class="card">
      <h2>Ask the Ledger Agent</h2>
      <div class="row">
        <label for="q-input">Question</label>
        <input type="text" id="q-input" placeholder="e.g. What is the YTD balance on Travel?" />
      </div>
      <button id="btn-ask">Ask</button>
      <div id="qa-area"></div>
    </div>
  </main>

  <script src="../assets/app.js?v=20260521"></script>
  <script src="../assets/workflow.js?v=20260521"></script>
  <script>
    renderHeader('Ledger');
    mountAgentInstructionsPanel('agent-info-host', ['inv-ldg-ag-ledger']);

    let ledger = null, invoices = [];

    function setAskLoading(loading) {
      const b = document.getElementById('btn-ask');
      b.disabled = loading;
      b.innerHTML = loading ? '<span class="spinner"></span>Asking...' : 'Ask';
    }

    function renderLedger() {
      const invByCategory = {};
      for (const inv of invoices) {
        for (const cat of (inv.categories || [])) {
          const key = cat.categoryName.trim().toLowerCase();
          if (!invByCategory[key]) invByCategory[key] = [];
          for (const li of (cat.lineItems || [])) {
            invByCategory[key].push({ ...li, invoiceId: inv.invoiceId, currency: inv.currency });
          }
        }
      }

      const blocks = ledger.categories.map(c => {
        const invItems = invByCategory[c.categoryName.trim().toLowerCase()] || [];
        const invRows = invItems.length
          ? invItems.map(li => `
              <tr>
                <td>${esc(li.invoiceId)}</td>
                <td>${esc(li.description)}</td>
                <td>${fmtMoney(li.unitPrice, li.currency)}</td>
                <td>${fmtMoney(li.lineTotal, li.currency)}</td>
              </tr>`).join('')
          : `<tr><td colspan="4" class="empty" style="padding:10px 8px;">No invoice items.</td></tr>`;
        return `
          <div class="cat-block">
            <h3>${esc(c.categoryName)} <span class="cat-meta">[${esc(c.ledgerCode)}] · Budget ${fmtMoney(c.approvedBudget, ledger.currency)} · YTD ${fmtMoney(c.ytdBalance, ledger.currency)}</span></h3>
            <div class="ledger-split">
              <div>
                <div class="col-label">Ledger Items</div>
                <table class="data">
                  <thead><tr><th>Sub-item</th><th style="width:140px;">Expected Unit Price</th><th>Aliases</th></tr></thead>
                  <tbody>
                    ${c.items.map(i => `
                      <tr>
                        <td>${esc(i.itemName)}</td>
                        <td>${fmtMoney(i.expectedUnitPrice, ledger.currency)}</td>
                        <td style="color:var(--muted);">${esc((i.aliases || []).join(', '))}</td>
                      </tr>`).join('')}
                  </tbody>
                </table>
              </div>
              <div>
                <div class="col-label">Invoice Items</div>
                <table class="data">
                  <thead><tr><th>Invoice</th><th>Description</th><th style="width:100px;">Unit Price</th><th style="width:100px;">Line Total</th></tr></thead>
                  <tbody>${invRows}</tbody>
                </table>
              </div>
            </div>
          </div>`;
      }).join('');
      document.getElementById('ledger-area').innerHTML = blocks;

      const rows = (ledger.postedEntries || []).map(p => `
        <tr>
          <td>${esc(p.entryId)}</td>
          <td>${esc(p.invoiceId)}</td>
          <td>${esc(p.vendorName)}</td>
          <td>${esc(p.category)}</td>
          <td>${esc(p.item)}</td>
          <td>${fmtMoney(p.amount, ledger.currency)}</td>
          <td>${esc(p.postedDate)}</td>
          <td>${statusBadge(p.status)}</td>
        </tr>`).join('');
      document.getElementById('posted-area').innerHTML = `
        <table class="data">
          <thead><tr><th>Entry</th><th>Invoice</th><th>Vendor</th><th>Category</th><th>Item</th><th>Amount</th><th>Posted</th><th>Status</th></tr></thead>
          <tbody>${rows || `<tr><td colspan="8" class="empty">No posted entries.</td></tr>`}</tbody>
        </table>`;
    }

    document.getElementById('btn-ask').addEventListener('click', async () => {
      const q = document.getElementById('q-input').value.trim();
      if (!q || !ledger) return;
      setAskLoading(true);
      document.getElementById('qa-area').innerHTML = `
        <div class="qa-box"><strong>Q:</strong> ${esc(q)}</div>
        <div class="qa-box" style="background:#eef2ff;border-color:#c7d2fe;">Running ledger agent...</div>`;
      try {
        const message = `${q}\n\nLedger snapshot:\n${JSON.stringify(ledger, null, 2)}`;
        const res = await fetch('/ledger/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ json: message })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
        document.getElementById('qa-area').innerHTML = `
          <div class="qa-box"><strong>Q:</strong> ${esc(q)}</div>
          <div class="qa-box" style="background:#eef2ff;border-color:#c7d2fe;"><strong>A:</strong> ${esc(data.response)}</div>`;
      } catch (err) {
        document.getElementById('qa-area').innerHTML = `
          <div class="qa-box"><strong>Q:</strong> ${esc(q)}</div>
          <div class="qa-box" style="background:#fee2e2;border-color:#fca5a5;">Error: ${esc(err.message)}</div>`;
      }
      setAskLoading(false);
    });

    document.getElementById('q-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-ask').click();
    });

    (async () => {
      const runSel = document.getElementById('run-select');
      const summary = document.getElementById('run-summary');
      try {
        const domain = await loadDomainData();
        ledger = domain.ledger;
        invoices = [];
        renderLedger();
      } catch (err) {
        document.getElementById('ledger-area').innerHTML = `<div class="empty error">${esc(err.message)}</div>`;
        return;
      }

      runSel.addEventListener('change', async () => {
        const runName = runSel.value;
        if (!runName) {
          summary.textContent = '';
          invoices = [];
          renderLedger();
          return;
        }
        summary.textContent = 'Loading invoice…';
        try {
          const payload = await loadRunInvoice(runName);
          if (!payload) {
            summary.innerHTML = `<span class="error">No extracted invoice for <strong>${esc(runName)}</strong>. Run the invoice agent on the Invoice tab first.</span>`;
            invoices = [];
          } else {
            invoices = extractInvoiceArray(payload);
            summary.textContent = `Showing ${invoices.length} invoice(s) from ${runName}.`;
          }
          renderLedger();
        } catch (err) {
          summary.innerHTML = `<span class="error">Error: ${esc(err.message)}</span>`;
        }
      });

      await populateRunSelect('run-select');
    })();
  </script>
</body>
</html>
