<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ledger Agent</title>
  <link rel="stylesheet" href="../assets/styles.css" />
  <style>
    table.data { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    table.data th, table.data td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
    table.data th { background: var(--input-bg); color: var(--muted); font-weight: 600; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.03em; }
    .cat-block { margin-top: 18px; border-top: 1px solid var(--border); padding-top: 14px; }
    .cat-block:first-child { border-top: none; margin-top: 0; padding-top: 0; }
    .cat-block h3 { font-size: 0.95rem; margin-bottom: 10px; }
    .cat-meta { color: var(--muted); font-weight: 400; font-size: 0.85rem; margin-left: 6px; }
    .ledger-split { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 800px) { .ledger-split { grid-template-columns: 1fr; } }
    .col-label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); margin-bottom: 6px; }
    .agent-card { background: #eef2ff; border: 1px solid #c7d2fe; }
    .qa-box { background: var(--input-bg); border: 1px solid var(--border); border-radius: 6px; padding: 12px; font-size: 0.88rem; margin-top: 8px; white-space: pre-wrap; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.5); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    table.data th.inv-col { background: #fef9c3; }
    table.data td.inv-col { background: #fefce8; }
  </style>
</head>
<body>
  <main>
    <h1>Ledger Screen <span id="agent-info-host"></span></h1>
    <div class="subtitle">Approved ledger categories, sub-items, and posted entries. The ledger agent answers questions about this data.</div>

    <div class="card">
      <h2>Approved Ledger</h2>
      <div class="row">
        <label for="run-select">Run</label>
        <select id="run-select"><option value="">Loading runs…</option></select>
      </div>
      <div id="run-summary" style="margin-top:8px;font-size:0.85rem;color:var(--muted);"></div>
      <div id="ledger-area" style="margin-top:10px;"><div class="empty">Loading...</div></div>
    </div>

    <div class="card">
      <h2>Posted Entries</h2>
      <div id="posted-area"><div class="empty">Loading...</div></div>
    </div>

    <div class="card">
      <h2>Ask the Ledger Agent</h2>
      <div class="row">
        <label for="q-input">Question</label>
        <input type="text" id="q-input" placeholder="e.g. What is the YTD balance on Travel?" />
      </div>
      <button id="btn-ask">Ask</button>
      <div id="qa-area"></div>
    </div>
  </main>

  <script src="../assets/app.js?v=20260523"></script>
  <script src="../assets/workflow.js?v=20260523"></script>
  <script>
    renderHeader('Ledger');
    mountAgentInstructionsPanel('agent-info-host', ['inv-ldg-ag-ledger']);

    let ledger = null, invoices = [], ledgerMatchedAll = [], ledgerExceptionAll = [];

    function setAskLoading(loading) {
      const b = document.getElementById('btn-ask');
      b.disabled = loading;
      b.innerHTML = loading ? '<span class="spinner"></span>Asking...' : 'Ask';
    }

    function renderLedger() {
      const invByCode = {};
      const invoiceCurrencyById = {};
      for (const inv of invoices) {
        invoiceCurrencyById[inv.invoiceId] = inv.invoiceCurrency || inv.originalInvoiceCurrency || inv.currency;
      }
      for (const r of [...ledgerMatchedAll, ...ledgerExceptionAll]) {
        const code = r.ledgerCode;
        if (!code) continue;
        const key = String(code).trim();
        if (!invByCode[key]) invByCode[key] = [];
        invByCode[key].push({
          invoiceId: r.invoiceId,
          lineNo: r.lineNo || r.lineItem,
          description: r.lineItemDescription,
          ledgerCode: code,
          unitPrice: r.unitPrice,
          lineTotal: r.lineTotal,
          currency: invoiceCurrencyById[r.invoiceId] || ledger.currency
        });
      }

      const blocks = ledger.categories.map(c => {
        const itemRows = c.items.map(i => {
          const code = String(i.ledgerCode || '').trim();
          const matches = invByCode[code] || [];
          const rowspan = Math.max(matches.length, 1);
          const ledgerCells = `
            <td rowspan="${rowspan}">${esc(i.ledgerCode)}</td>
            <td rowspan="${rowspan}">${esc(i.itemName)}</td>
            <td rowspan="${rowspan}">${fmtMoney(i.expectedUnitPrice, ledger.currency)}</td>
            <td rowspan="${rowspan}" style="color:var(--muted);">${esc((i.aliases || []).join(', '))}</td>`;
          if (!matches.length) {
            return `<tr>${ledgerCells}<td colspan="5" class="empty inv-col">No invoice items.</td></tr>`;
          }
          return matches.map((li, idx) => `
            <tr>
              ${idx === 0 ? ledgerCells : ''}
              <td class="inv-col">${esc(li.invoiceId)}</td>
              <td class="inv-col">${esc(li.lineNo)}</td>
              <td class="inv-col">${esc(li.description)}</td>
              <td class="inv-col">${fmtMoney(li.unitPrice, li.currency)}</td>
              <td class="inv-col">${fmtMoney(li.lineTotal, li.currency)}</td>
            </tr>`).join('');
        }).join('');
        return `
          <div class="cat-block">
            <h3>${esc(c.categoryName)} <span class="cat-meta">Budget ${fmtMoney(c.approvedBudget, ledger.currency)} · YTD ${fmtMoney(c.ytdBalance, ledger.currency)}</span></h3>
            <table class="data">
              <thead>
                <tr>
                  <th style="width:70px;">Code</th>
                  <th style="width:22%;">Sub-item</th>
                  <th style="width:120px;">Expected Unit Price</th>
                  <th style="width:18%;">Aliases</th>
                  <th class="inv-col">Invoice</th>
                  <th class="inv-col" style="width:60px;">Line</th>
                  <th class="inv-col">Description</th>
                  <th class="inv-col" style="width:100px;">Unit Price</th>
                  <th class="inv-col" style="width:100px;">Line Total</th>
                </tr>
              </thead>
              <tbody>${itemRows}</tbody>
            </table>
          </div>`;
      }).join('');
      document.getElementById('ledger-area').innerHTML = blocks;

      const rows = ledgerMatchedAll.map(p => `
        <tr>
          <td>${esc((p.invoiceId || '') + '-' + (p.lineNo || p.lineItem || ''))}</td>
          <td>${esc(p.invoiceId)}</td>
          <td>${esc(p.businessName)}</td>
          <td>${esc(p.ledgerCode || '')}</td>
          <td>${esc(p.matchedLedgerItem || p.lineItemDescription)}</td>
          <td>${fmtMoney(p.convertedLineTotal, p.convertedCurrency || ledger.currency)}</td>
          <td>${esc(p.status || '')}</td>
        </tr>`).join('');
      document.getElementById('posted-area').innerHTML = `
        <table class="data">
          <thead><tr><th>Entry</th><th>Invoice</th><th>Vendor</th><th>Ledger Code</th><th>Item</th><th>Amount</th><th>Status</th></tr></thead>
          <tbody>${rows || `<tr><td colspan="7" class="empty">No matched entries for the selected run.</td></tr>`}</tbody>
        </table>`;
    }

    document.getElementById('btn-ask').addEventListener('click', async () => {
      const q = document.getElementById('q-input').value.trim();
      if (!q || !ledger) return;
      setAskLoading(true);
      document.getElementById('qa-area').innerHTML = `
        <div class="qa-box"><strong>Q:</strong> ${esc(q)}</div>
        <div class="qa-box" style="background:#eef2ff;border-color:#c7d2fe;">Running ledger agent...</div>`;
      try {
        const message = `${q}\n\nLedger snapshot:\n${JSON.stringify(ledger, null, 2)}`;
        const res = await fetch('/ledger/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ json: message })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
        document.getElementById('qa-area').innerHTML = `
          <div class="qa-box"><strong>Q:</strong> ${esc(q)}</div>
          <div class="qa-box" style="background:#eef2ff;border-color:#c7d2fe;"><strong>A:</strong> ${esc(data.response)}</div>`;
      } catch (err) {
        document.getElementById('qa-area').innerHTML = `
          <div class="qa-box"><strong>Q:</strong> ${esc(q)}</div>
          <div class="qa-box" style="background:#fee2e2;border-color:#fca5a5;">Error: ${esc(err.message)}</div>`;
      }
      setAskLoading(false);
    });

    document.getElementById('q-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-ask').click();
    });

    (async () => {
      const runSel = document.getElementById('run-select');
      const summary = document.getElementById('run-summary');
      try {
        const domain = await loadDomainData();
        ledger = domain.ledger;
        invoices = [];
        ledgerMatchedAll = [];
        ledgerExceptionAll = [];
        renderLedger();
      } catch (err) {
        document.getElementById('ledger-area').innerHTML = `<div class="empty error">${esc(err.message)}</div>`;
        return;
      }

      runSel.addEventListener('change', async () => {
        const runName = runSel.value;
        if (!runName) {
          summary.textContent = '';
          invoices = [];
          ledgerMatchedAll = [];
          ledgerExceptionAll = [];
          renderLedger();
          return;
        }
        summary.textContent = 'Loading processing result…';
        try {
          const res = await fetch(`/processing/runs/${encodeURIComponent(runName)}`);
          if (res.status === 404) {
            summary.innerHTML = `<span class="error">No processing result for <strong>${esc(runName)}</strong>. Run the processing agent on the Processing tab first.</span>`;
            invoices = [];
            ledgerMatchedAll = [];
            ledgerExceptionAll = [];
          } else if (!res.ok) {
            throw new Error(`HTTP ${res.status}`);
          } else {
            const payload = await res.json();
            invoices = Array.isArray(payload?.invoices) ? payload.invoices : [];
            ledgerMatchedAll = Array.isArray(payload?.LedgerMatched) ? payload.LedgerMatched : [];
            ledgerExceptionAll = Array.isArray(payload?.LedgerException) ? payload.LedgerException : [];
            summary.textContent = `Showing ${invoices.length} invoice(s) · ${ledgerMatchedAll.length} matched · ${ledgerExceptionAll.length} exception(s) from ${runName}.`;
          }
          renderLedger();
        } catch (err) {
          summary.innerHTML = `<span class="error">Error: ${esc(err.message)}</span>`;
        }
      });

      await populateRunSelect('run-select');
    })();
  </script>
</body>
</html>
